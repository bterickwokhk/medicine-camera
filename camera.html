<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Scanner</title>

<script src="https://unpkg.com/@zxing/browser@0.1.5"></script>

<style>

html,
body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
}

video{
width:100vw;
height:100vh;
object-fit:cover;
}

#msg{
position:fixed;
top:10px;
left:0;
right:0;
text-align:center;
color:white;
font-size:18px;
font-family:Arial;
z-index:999;
}

</style>

</head>

<body>

<div id="msg">
對準條碼...
</div>

<video
id="video"
autoplay
playsinline
muted>
</video>

<script>

let stream;
let scanning=true;

function sendBack(code){

  scanning=false;

  document.getElementById("msg").innerHTML=
  code;

  if(window.opener){

    window.opener.postMessage(
    {
      type:"barcode",
      code:code
    },
    "*");

    setTimeout(()=>{
      window.close();
    },100);

  }

}

async function startBarcodeDetector(){

  if(
    !("BarcodeDetector" in window)
  ){
    return false;
  }

  const formats=[
    "qr_code",
    "ean_13",
    "ean_8",
    "code_128",
    "upc_a",
    "upc_e"
  ];

  const detector=
  new BarcodeDetector({
    formats:formats
  });

  stream=
  await navigator.mediaDevices.getUserMedia({
    video:{
      facingMode:{
        ideal:"environment"
      },
      width:{
        ideal:1280
      },
      height:{
        ideal:720
      }
    },
    audio:false
  });

  const video=
  document.getElementById("video");

  video.srcObject=stream;

  await video.play();

  async function scan(){

    if(!scanning) return;

    try{

      const codes=
      await detector.detect(video);

      if(codes.length){

        sendBack(
          codes[0].rawValue
        );

        return;
      }

    }catch(e){}

    requestAnimationFrame(scan);

  }

  scan();

  return true;

}

async function startZXing(){

  const video=
  document.getElementById("video");

  stream=
  await navigator.mediaDevices.getUserMedia({

    video:{
      facingMode:"environment",
      width:{
        ideal:1280
      },
      height:{
        ideal:720
      }
    },

    audio:false

  });

  video.srcObject=stream;

  await video.play();

  const reader=
  new ZXing.BrowserMultiFormatReader();

  reader.decodeFromVideoElement(
    video,
    result=>{

      if(
        result &&
        scanning
      ){

        sendBack(
          result.getText()
        );

      }

    }
  );

}

async function start(){

  try{

    const ok=
    await startBarcodeDetector();

    if(!ok){

      await startZXing();

    }

  }
  catch(err){

    console.log(err);

    document.getElementById("msg")
    .innerHTML=
    "無法開啟相機";

  }

}

start();

</script>

</body>

</html>
