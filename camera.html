<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Barcode Scanner</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>

*{
  box-sizing:border-box;
}


body{

  font-family:
  "Comic Sans MS",
  "Microsoft JhengHei",
  Arial,
  sans-serif;

  text-align:center;

  margin:0;
  padding:20px;

  min-height:100vh;

  background:
    linear-gradient(
      135deg,
      #fff6d6,
      #dff6ff,
      #ffe0f0
    );

}



/* title */

h2{

  margin:10px 0 20px;

  font-size:28px;

  color:#4b3f72;

  text-shadow:
  2px 2px 0 white;

}



/* scanner card */

#reader{

  width:100%;

  max-width:520px;

  margin:auto;

  padding:15px;


  background:white;


  border-radius:30px;


  box-shadow:

  0 8px 20px rgba(0,0,0,0.15);


  overflow:hidden;

}



/* camera area */

#reader video{

  border-radius:25px !important;

}



/* scan line area */

#reader__scan_region{

  border-radius:25px;

}



/* hide ugly html5 buttons */

#reader button{

  background:#ff9f43;

  border:none;

  color:white;

  font-size:16px;

  font-weight:bold;

  padding:10px 25px;

  border-radius:30px;

  margin-top:15px;


  cursor:pointer;

}



/* result box */

#result{

  margin:25px auto 0;

  max-width:520px;


  padding:15px;


  background:

  rgba(255,255,255,0.85);


  border-radius:25px;


  font-size:22px;

  font-weight:bold;


  color:#5c5470;


  box-shadow:

  0 5px 15px rgba(0,0,0,0.12);


}



/* success animation */

.scan-success{


  animation:

  pop 0.3s ease;

}



@keyframes pop{


0%{

 transform:scale(.8);

}


100%{

 transform:scale(1);

}


}



/* mobile */

@media(max-width:600px){


h2{

font-size:22px;

}


#reader{

padding:10px;

border-radius:25px;

}


#result{

font-size:18px;

}


}


</style>

</head>


<body>

<h2>📷 藥物條碼 / QR Code 掃描</h2>

<div id="reader"></div>

<div id="result">
等待掃描...
</div>


<script>


// =======================
// Send barcode back
// =======================

function sendBack(code){

  document.getElementById("result").innerHTML =
    "已掃描: " + code;


  console.log("Sending:", code);


  if(window.opener){

    window.opener.postMessage(
      {
        type:"barcode",
        code:code
      },
      "*"
    );


    setTimeout(function(){

      window.close();

    },50);

  }

}



// =======================
// Scanner
// =======================

const html5QrCode =
  new Html5Qrcode("reader");


let scanning=false;



function startScanner(){


  if(scanning) return;


  scanning=true;



  html5QrCode.start(


    {
      facingMode:"environment"
    },


    {


      // faster stable scan

      fps:45,


      qrbox:{
        width:260,
        height:90
      },


      disableFlip:true,


      formatsToSupport:[


        Html5QrcodeSupportedFormats.QR_CODE,


        Html5QrcodeSupportedFormats.CODE_128,


        Html5QrcodeSupportedFormats.CODE_39,


        Html5QrcodeSupportedFormats.ITF,


        Html5QrcodeSupportedFormats.EAN_13,


        Html5QrcodeSupportedFormats.EAN_8,


        Html5QrcodeSupportedFormats.UPC_A,


        Html5QrcodeSupportedFormats.UPC_E


      ]


    },


    function(decodedText){


      if(!decodedText) return;


      console.log(
        "Detected:",
        decodedText
      );


      scanning=false;



      // stop camera first
      html5QrCode.stop()

      .then(function(){


        sendBack(decodedText);


      })


      .catch(function(){


        sendBack(decodedText);


      });



    },


    function(errorMessage){

      // ignore scan errors

    }


  )


  .catch(function(err){


    console.error(err);


    document.getElementById("result").innerHTML =
      "無法開啟相機";


    scanning=false;


  });


}



// =======================
// Start immediately
// =======================

startScanner();



</script>


</body>

</html>
