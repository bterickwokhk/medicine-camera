<!DOCTYPE html>
<html lang="en">

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Medicine Scanner</title>


<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>


<style>

body{

font-family:Arial,"Microsoft JhengHei";

text-align:center;

margin:10px;

}


#reader{

width:100%;

max-width:500px;

margin:auto;

}



#result{

margin-top:20px;

font-size:20px;

font-weight:bold;

}



</style>


</head>


<body>


<h2>📷 Barcode / QR Scanner</h2>



<div id="reader"></div>



<div id="result">

掃瞄中...

</div>




<script>


let finished=false;



// ============================
// Send result back
// ============================


function sendBack(value,type){


if(finished)return;


finished=true;



document.getElementById("result").innerHTML=

type+
"<br>"+
value;



console.log(type,value);



if(window.opener){


window.opener.postMessage({

type:"barcode",

code:value,

scanType:type


},"*");



setTimeout(()=>{

window.close();

},1000);


}


}






// ============================
// Barcode + QR Scanner
// ============================


const scanner = new Html5QrcodeScanner(

"reader",

{


fps:15,


qrbox:{


width:350,

height:140


},



rememberLastUsedCamera:true,


disableFlip:true,


formatsToSupport:[


Html5QrcodeSupportedFormats.EAN_13,


Html5QrcodeSupportedFormats.EAN_8,


Html5QrcodeSupportedFormats.CODE_128,


Html5QrcodeSupportedFormats.CODE_39,


Html5QrcodeSupportedFormats.UPC_A,


Html5QrcodeSupportedFormats.QR_CODE


]


},


false


);





scanner.render(


(decodedText)=>{


sendBack(

decodedText,

"BARCODE / QR"

);



scanner.clear();


},


(error)=>{


// keep scanning


}



);



</script>


</body>

</html>
