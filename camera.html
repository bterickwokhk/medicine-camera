<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Barcode Scanner</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>

body{
  font-family: Arial;
  text-align:center;
  margin:10px;
}

#reader{
  width:100%;
  max-width:500px;
  margin:auto;
}

#result{
  margin-top:20px;
  font-size:20px;
  font-weight:bold;
}

</style>

</head>

<body>

<h2>📷 藥物條碼掃描</h2>

<div id="reader"></div>

<div id="result">
等待掃描...
</div>

<script>

// =======================
// Beep sound
// =======================

function beep(){

  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  const oscillator = audioCtx.createOscillator();

  const gainNode = audioCtx.createGain();

  oscillator.type = "sine";
  oscillator.frequency.value = 1000;

  gainNode.gain.value = 0.3;

  oscillator.connect(gainNode);
  gainNode.connect(audioCtx.destination);

  oscillator.start();

  setTimeout(function(){

    oscillator.stop();
    audioCtx.close();

  },80);

}

// =======================
// Send barcode back
// =======================

function sendBack(code){

  document.getElementById("result").innerHTML =
    "條碼: " + code;

  console.log("Sending:", code);

  if(window.opener){

    window.opener.postMessage(
      {
        type:"barcode",
        code:code
      },
      "*"
    );

    setTimeout(function(){

      window.close();

    },300);

  }
  else{

    console.log("No opener window");

  }

}

// =======================
// Scanner
// =======================

const html5QrCode = new Html5Qrcode("reader");

function startScanner(){

  Html5Qrcode.getCameras()
  .then(devices => {

    if(!devices || devices.length === 0){

      document.getElementById("result").innerHTML =
        "找不到相機";

      return;
    }

    let backCamera = devices.find(device => {

      const label = device.label.toLowerCase();

      return (
        label.includes("back") ||
        label.includes("rear") ||
        label.includes("environment")
      );

    });

    if(!backCamera){

      backCamera = devices[devices.length - 1];

    }

    console.log("Using camera:", backCamera.label);

    html5QrCode.start(

      backCamera.id,

      {

        fps:30,

        qrbox:{
          width:300,
          height:150
        },

        aspectRatio:1.777

      },

      function(decodedText){

        console.log("Detected:", decodedText);

        beep();

        sendBack(decodedText);

        html5QrCode.stop();

      },

      function(errorMessage){

        // keep scanning

      }

    );

  })
  .catch(err => {

    console.error(err);

    document.getElementById("result").innerHTML =
      "無法開啟相機";

  });

}

// =======================
// Start immediately
// =======================

startScanner();

</script>

</body>

</html>
