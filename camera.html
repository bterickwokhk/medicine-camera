<!DOCTYPE html>
<html lang="en">

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Medicine Scanner</title>


<!-- Barcode / QR -->
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>


<!-- OCR -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>


<style>

body{
font-family:Arial;
text-align:center;
margin:10px;
}


#reader{
width:100%;
max-width:500px;
margin:auto;
}


#ocrVideo{
width:100%;
max-width:500px;
display:none;
}


#result{
margin-top:20px;
font-size:20px;
font-weight:bold;
}


button{

padding:12px 20px;
font-size:18px;
border:0;
border-radius:8px;
background:#2196F3;
color:white;

}

</style>

</head>


<body>


<h2>📷 Medicine Scanner</h2>


<div id="reader"></div>


<video id="ocrVideo"
autoplay
playsinline>
</video>


<br>


<button onclick="startOCR()">
🔤 Scan Text
</button>


<div id="result">
Waiting...
</div>



<script>


let finished=false;



// =============================
// Send result back
// =============================

function sendBack(value,type){


if(finished)return;


finished=true;


document.getElementById("result").innerHTML=
type+"<br>"+value;



if(window.opener){


window.opener.postMessage({

type:"barcode",

code:value,

scanType:type


},"*");



setTimeout(()=>{

window.close();

},1000);


}


}



// =============================
// Barcode / QR scanner
// =============================


const scanner =
new Html5QrcodeScanner(

"reader",

{

fps:15,


qrbox:{
width:350,
height:140
},


rememberLastUsedCamera:true,


disableFlip:true,


formatsToSupport:[


Html5QrcodeSupportedFormats.EAN_13,

Html5QrcodeSupportedFormats.EAN_8,

Html5QrcodeSupportedFormats.CODE_128,

Html5QrcodeSupportedFormats.CODE_39,

Html5QrcodeSupportedFormats.UPC_A,

Html5QrcodeSupportedFormats.QR_CODE


]

},

false

);



scanner.render(

(decodedText)=>{


sendBack(
decodedText,
"BARCODE / QR"
);


scanner.clear();


},


(error)=>{

}

);




// =============================
// OCR
// =============================


let ocrStream;



function startOCR(){


let video=
document.getElementById("ocrVideo");


video.style.display="block";



navigator.mediaDevices.getUserMedia({

video:{

facingMode:"environment",

width:{
ideal:1280
},

height:{
ideal:720
}

}

})


.then(stream=>{


ocrStream=stream;


video.srcObject=stream;



video.onloadedmetadata=()=>{


setTimeout(()=>{


captureText(video);


},2000);



};



})


.catch(err=>{


alert(
"Camera error: "+err
);


});


}




function captureText(video){



if(finished)return;



let canvas=
document.createElement("canvas");



canvas.width=
video.videoWidth;


canvas.height=
video.videoHeight;



let ctx=
canvas.getContext("2d");



ctx.drawImage(

video,

0,

0,

canvas.width,

canvas.height

);




document.getElementById("result").innerHTML=
"Reading text...";




Tesseract.recognize(

canvas,

'eng',

{


logger:function(m){

console.log(m);

}


}

)


.then(({data:{text}})=>{


let clean=text.trim();



console.log(
"OCR:",
clean
);



if(clean.length>1){


sendBack(

clean,

"OCR TEXT"

);


}

else{


document.getElementById("result").innerHTML=
"No text found";


}



})


.catch(err=>{


console.log(err);


document.getElementById("result").innerHTML=
"OCR error";


});


}



</script>


</body>

</html>
