<!DOCTYPE html>
<html lang="en">

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Medicine Scanner</title>


<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>


<style>

body{

font-family:Arial,"Microsoft JhengHei";

text-align:center;

margin:10px;

}


/* Barcode scanner */

#reader{

width:100%;

max-width:500px;

margin:auto;

}



/* OCR scanner same size as barcode box */

#ocrContainer{

position:relative;

width:350px;

height:140px;

margin:auto;

display:none;

overflow:hidden;

border-radius:8px;

}



#ocrVideo{

width:350px;

height:140px;

object-fit:cover;

}



#ocrBox{

position:absolute;

top:0;

left:0;

width:350px;

height:140px;

border:3px solid #00ff00;

border-radius:8px;

box-sizing:border-box;

pointer-events:none;

}



#result{

margin-top:20px;

font-size:20px;

font-weight:bold;

}



button{

padding:12px 20px;

font-size:18px;

border:none;

border-radius:8px;

background:#2196F3;

color:white;

margin-top:10px;

}



</style>


</head>


<body>


<h2>📷 Medicine Scanner</h2>



<!-- Barcode / QR -->

<div id="reader"></div>



<!-- OCR -->

<div id="ocrContainer">


<video id="ocrVideo"
autoplay
playsinline>
</video>


<div id="ocrBox"></div>


</div>



<br>



<button onclick="startOCR()">

🔤 Scan Text

</button>



<div id="result">

Waiting...

</div>



<script>


let finished=false;


// ===============================
// Send result back
// ===============================


function sendBack(value,type){


if(finished)return;


finished=true;



document.getElementById("result").innerHTML=

type+
"<br>"+
value;



if(window.opener){


window.opener.postMessage({

type:"barcode",

code:value,

scanType:type


},"*");



setTimeout(()=>{

window.close();

},1000);


}



}






// ===============================
// Barcode / QR scanner
// ===============================


const scanner =
new Html5QrcodeScanner(

"reader",

{

fps:15,


qrbox:{

width:350,

height:140

},


rememberLastUsedCamera:true,


disableFlip:true,


formatsToSupport:[


Html5QrcodeSupportedFormats.EAN_13,

Html5QrcodeSupportedFormats.EAN_8,

Html5QrcodeSupportedFormats.CODE_128,

Html5QrcodeSupportedFormats.CODE_39,

Html5QrcodeSupportedFormats.UPC_A,

Html5QrcodeSupportedFormats.QR_CODE


]

},

false

);





scanner.render(

(decodedText)=>{


sendBack(

decodedText,

"BARCODE / QR"

);



scanner.clear();


},


(error)=>{


}

);








// ===============================
// OCR scanner
// ===============================


let ocrStream;



function startOCR(){



document.getElementById("reader").style.display="none";


let container=
document.getElementById("ocrContainer");


let video=
document.getElementById("ocrVideo");



container.style.display="block";



navigator.mediaDevices.getUserMedia({

video:{


facingMode:"environment",


width:{
ideal:1280
},


height:{
ideal:720
}


}

})



.then(stream=>{


ocrStream=stream;


video.srcObject=stream;



video.onloadedmetadata=()=>{


setTimeout(()=>{


captureText(video);


},2000);


};



})


.catch(err=>{


alert(
"Camera error: "+err
);


});


}







function captureText(video){


if(finished)return;



let canvas=document.createElement("canvas");



canvas.width=700;

canvas.height=280;



let ctx=
canvas.getContext("2d");



// only capture focus area

let sx=
video.videoWidth*0.25;


let sy=
video.videoHeight*0.40;


let sw=
video.videoWidth*0.50;


let sh=
video.videoHeight*0.20;



ctx.drawImage(

video,

sx,

sy,

sw,

sh,

0,

0,

700,

280

);





document.getElementById("result").innerHTML=

"Reading text...";





Tesseract.recognize(

canvas,

'eng',

{

logger:function(m){

console.log(m);

}

}

)


.then(({data:{text}})=>{


let txt=text.trim();



console.log(
"OCR:",
txt
);



if(txt.length>1){


sendBack(

txt,

"OCR TEXT"

);


}

else{


setTimeout(()=>{


captureText(video);


},1000);


}



})


.catch(err=>{


console.log(err);


});


}



</script>


</body>

</html>
