<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Barcode Scanner</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>

body{
  font-family:Arial;
  text-align:center;
  margin:10px;
}

#reader{
  width:100%;
  max-width:700px;
  margin:auto;
}

#result{
  margin-top:20px;
  font-size:20px;
  font-weight:bold;
}

</style>

</head>

<body>

<h2>📷 藥物條碼 / QR Code 掃描</h2>

<div id="reader"></div>

<div id="result">
等待掃描...
</div>

<script>

// =======================
// Send barcode back
// =======================

function sendBack(code){

  document.getElementById("result").innerHTML =
    "已掃描: " + code;

  console.log("Sending:", code);

  if(window.opener){

    window.opener.postMessage(
      {
        type:"barcode",
        code:code
      },
      "*"
    );

    setTimeout(function(){

      window.close();

    },100);

  }

}

// =======================
// Scanner
// =======================

const html5QrCode =
  new Html5Qrcode("reader");

let scanning = false;

function startScanner(){

  if(scanning) return;

  scanning = true;

  html5QrCode.start(

    {
      facingMode:"environment"
    },

    {

      fps:60,

      qrbox:{
        width:600,
        height:250
      },

      aspectRatio:1.777,

      disableFlip:true,

      formatsToSupport:[

        Html5QrcodeSupportedFormats.QR_CODE,

        Html5QrcodeSupportedFormats.CODE_128,

        Html5QrcodeSupportedFormats.EAN_13,

        Html5QrcodeSupportedFormats.EAN_8,

        Html5QrcodeSupportedFormats.UPC_A,

        Html5QrcodeSupportedFormats.UPC_E

      ]

    },

    function(decodedText){

      if(!decodedText) return;

      console.log("Detected:",decodedText);

      scanning = false;

      sendBack(decodedText);

      html5QrCode.stop()
      .catch(()=>{});

    },

    function(errorMessage){

      // ignore

    }

  )

  .catch(err=>{

    console.error(err);

    document.getElementById("result").innerHTML =
      "無法開啟相機";

  });

}

// =======================
// Start
// =======================

window.onload=function(){

  startScanner();

};

</script>

</body>

</html>
